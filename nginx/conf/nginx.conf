worker_processes auto;

events {
    worker_connections 1024;
}

http {
     server_names_hash_bucket_size 128;
    server_names_hash_max_size 4096;

    map_hash_bucket_size 128;
    map_hash_max_size 4096;

    include /etc/nginx/conf.d/*.conf;
    # =========================================================
    # Cloudflare enforcement
    # =========================================================
    map $http_cf_connecting_ip $from_cloudflare {
        default 0;
        "~."    1;
    }

    # =========================================================
    # Cloudflare Real IP ranges
    # =========================================================
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # =========================================================
    # Core
    # =========================================================
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    # =========================================================
    # Gzip
    # =========================================================
    gzip on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml;

    # =========================================================
    # Logging
    # =========================================================
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" $request_time';

    access_log C:/nginx/logs/access.log main;
    error_log  C:/nginx/logs/error.log warn;

    # =========================================================
    # Upstreams
    # =========================================================
    upstream api_backend {
        server 127.0.0.1:8000;
    }

    # =========================================================
    # DEFAULT SERVERS (scan killer)
    # =========================================================
    server {
        listen 80 default_server;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        ssl_certificate      C:/nginx/ssl/origin_cert.pem;
        ssl_certificate_key  C:/nginx/ssl/origin_key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        return 444;
    }

    # =========================================================
    # ROOT DOMAIN - FRONTEND (habbojoh.com.tr)
    # =========================================================
    server {
        listen 80;
        server_name habbojoh.com.tr www.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }
        return 301 https://habbojoh.com.tr$request_uri;
    }

    server {
        listen 443 ssl;
        server_name habbojoh.com.tr www.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }

        ssl_certificate      C:/nginx/ssl/origin_cert.pem;
        ssl_certificate_key  C:/nginx/ssl/origin_key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        http2 on;

        root  C:/nginx/html;
        index index.html;

        location / {
            try_files $uri /index.html;
        }
    }

    # =========================================================
    # BETA -> ROOT REDIRECT
    # =========================================================
    server {
        listen 80;
        server_name beta.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }
        return 301 https://habbojoh.com.tr$request_uri;
    }

    server {
        listen 443 ssl;
        server_name beta.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }

        ssl_certificate      C:/nginx/ssl/origin_cert.pem;
        ssl_certificate_key  C:/nginx/ssl/origin_key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 301 https://habbojoh.com.tr$request_uri;
    }

    # =========================================================
    # LIVE - live.habbojoh.com.tr (Vite / WebSocket)
    # =========================================================
    server {
        listen 80;
        server_name live.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name live.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }

        ssl_certificate      C:/nginx/ssl/origin_cert.pem;
        ssl_certificate_key  C:/nginx/ssl/origin_key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        http2 on;

        client_max_body_size 20m;

        location / {
            proxy_pass http://127.0.0.1:5173;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 90s;
            proxy_send_timeout 60s;
        }
    }
    server {
        listen 80;
        server_name eecb6.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name eecb6.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }

        ssl_certificate      C:/nginx/ssl/origin_cert.pem;
        ssl_certificate_key  C:/nginx/ssl/origin_key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        http2 on;

        client_max_body_size 20m;

        location / {
            proxy_pass http://127.0.0.1:8082;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 90s;
            proxy_send_timeout 60s;
        }
    }

     server {
        listen 80;
        server_name ws244.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name ws244.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }

        ssl_certificate      C:/nginx/ssl/origin_cert.pem;
        ssl_certificate_key  C:/nginx/ssl/origin_key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        http2 on;

        client_max_body_size 20m;

        location / {
            proxy_pass http://127.0.0.1:10000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 90s;
            proxy_send_timeout 60s;
        }
    }
    
    # =========================================================
    # API - api.habbojoh.com.tr
    # =========================================================
    server {
        listen 80;
        server_name api.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }

        ssl_certificate      C:/nginx/ssl/origin_cert.pem;
        ssl_certificate_key  C:/nginx/ssl/origin_key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        http2 on;

        client_max_body_size 20m;

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 90s;
            proxy_send_timeout 60s;
        }

        location = /health {
            proxy_pass http://api_backend/health;
            proxy_buffering off;
            access_log off;
        }
    }
    # =========================================================
    # EXTENSION - extension.habbojoh.com.tr (port 3000)
    # =========================================================
    server {
        listen 80;
        server_name ext.habbojoh.com.tr;

        if ($from_cloudflare = 0) { return 444; }
        return 301 https://ext.habbojoh.com.tr$request_uri;
    }

    server {
        listen 443 ssl;
        server_name ext.habbojoh.com.tr;

        # Cloudflare enforcement
        if ($from_cloudflare = 0) { return 444; }

        ssl_certificate      C:/nginx/ssl/origin_cert.pem;
        ssl_certificate_key  C:/nginx/ssl/origin_key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        http2 on;

        client_max_body_size 10m;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket / Extension live connection support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 90s;
            proxy_send_timeout 60s;
        }
    }

}
